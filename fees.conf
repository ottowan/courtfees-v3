# HTTP redirect to HTTPS
server {
    listen 80;
    server_name fees.coj.go.th fees2.coj.go.th;

    access_log /var/log/nginx/fees_redirect_access.log;
    error_log  /var/log/nginx/fees_redirect_error.log warn;

    return 301 https://$host$request_uri;
}

# fees.coj.go.th -> Docker local port 3000
server {
    listen 443 ssl http2;
    server_name fees.coj.go.th;

    ssl_certificate     /etc/nginx/ssl/2027_coj.go.th.crt;
    ssl_certificate_key /etc/nginx/ssl/2027_coj.go.th.key;

    access_log /var/log/nginx/fees_access.log;
    error_log  /var/log/nginx/fees_error.log warn;

    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:3000;

        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

